# Nginx reverse proxy — Sentinel OS as default VPS UI
# Place in /etc/nginx/sites-available/sentinel and symlink to sites-enabled.
#
# Assumes:
#   - Sentinel OS runs on port 3000 (Next.js / docker)
#   - Hermes Lisa runs on port 4860
#   - OpenClaw runs on port 3001 (or wherever its legacy UI is)
#   - SSL termination handled by Certbot / Let's Encrypt

server {
    listen 80;
    server_name srv1427612.hstgr.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name srv1427612.hstgr.cloud;

    ssl_certificate     /etc/letsencrypt/live/srv1427612.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1427612.hstgr.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Sentinel OS — default root ──────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Legacy Hermes Lisa UI ───────────────────────────────────────────────
    location /legacy/hermes {
        rewrite ^/legacy/hermes(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:4860;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Legacy OpenClaw UI ──────────────────────────────────────────────────
    location /legacy/openclaw {
        rewrite ^/legacy/openclaw(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
